<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拒绝访问</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        danger: '#ff4d4f',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .method-post { @apply bg-blue-500 text-white px-2 py-1 rounded text-xs font-bold; }
            .method-get { @apply bg-green-500 text-white px-2 py-1 rounded text-xs font-bold; }
        }
    </style>
</head>
<body class="bg-gray-50">

<!-- 访问错误页面（默认隐藏，非法访问显示） -->
<div id="errorPage" class="hidden min-h-screen flex flex-col items-center justify-center p-6 text-center">
    <div class="w-20 h-20 flex items-center justify-center bg-red-100 rounded-full mb-6">
        <i class="fa-solid fa-ban text-4xl text-red-500"></i>
    </div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">访问拒绝</h1>
    <p class="text-gray-500 max-w-md mb-1">该域名仅供APP内调用</p>
    <p class="text-gray-400 text-sm mb-6">无法在浏览器单独访问！</p>
    <div class="text-xs text-gray-400">
        专属域名：<span class="font-mono text-primary">appapi.netlify.app</span>
    </div>
</div>

<!-- 正常API页面（默认隐藏，校验通过显示） -->
<div id="normalPage" class="hidden">
    <header class="sticky top-0 z-50 bg-white shadow">
        <div class="container mx-auto px-4 py-3 flex items-center gap-2">
            <i class="fa-solid fa-code text-primary text-2xl"></i>
            <h1 class="text-xl font-bold text-primary">APP专属API服务</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-10">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold">接口在线调试</h2>
            <p class="text-gray-500 text-sm">APP内部专用接口，外部无法访问</p>
        </div>

        <!-- 登录接口 -->
        <div class="bg-white rounded-xl shadow p-6 mb-8">
            <div class="flex items-center gap-3 mb-4">
                <span class="method-post">POST</span>
                <h3 class="text-lg font-bold">用户登录</h3>
            </div>
            <div class="mb-3">
                <label class="text-sm text-gray-600 block mb-1">接口地址</label>
                <input type="text" value="https://api.app-pro.com/api/user/login" class="w-full border border-gray-200 p-2 rounded bg-gray-50 font-mono">
            </div>
            <div class="mb-3">
                <label class="text-sm text-gray-600 block mb-1">请求参数</label>
                <textarea rows="5" class="w-full border border-gray-200 p-2 rounded font-mono text-sm">{
    "phone":"13800138000",
    "password":"123456"
}</textarea>
            </div>
            <div class="mb-4">
                <label class="text-sm text-gray-600 block mb-1">响应结果</label>
                <pre class="bg-gray-900 text-white p-3 rounded text-sm overflow-auto max-h-48"><code class="language-json">{
    "code":200,
    "msg":"登录成功",
    "data":{"token":"app_only_token"}
}</code></pre>
            </div>
        </div>
    </main>

    <footer class="text-center py-6 text-gray-500 text-sm">
        © 2026 APP专属API | 仅APP可访问
    </footer>
</div>

<script>
// ============== 核心配置 ==============
const CONFIG = {
    // 你的APP专属域名
    allowDomain: 'appapi.netlify.app',
    // APP的UA标识（你APP里WebView设置的UA关键字）
    appUaKeywords: ['MyAppAndroid', 'MyAppIOS', 'AppInternalWebView'],
    // 是否强制域名校验
    checkDomain: true,
}

// ============== 访问校验 ==============
function checkAccess() {
    const ua = navigator.userAgent || '';
    const currentHost = window.location.hostname;
    
    // 1. 域名校验
    if(CONFIG.checkDomain && currentHost !== CONFIG.allowDomain) {
        return false;
    }
    
    // 2. APP UA校验
    const isApp = CONFIG.appUaKeywords.some(key => ua.includes(key));
    if(!isApp) {
        return false;
    }
    
    return true;
}

// ============== 页面显示控制 ==============
document.addEventListener('DOMContentLoaded', () => {
    const isAllow = checkAccess();
    
    if(isAllow) {
        document.getElementById('normalPage').classList.remove('hidden');
        hljs.highlightAll();
    } else {
        document.getElementById('errorPage').classList.remove('hidden');
    }
});
</script>
</body>
</html>
